server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    nacos:
      discovery:
        enabled: ${NACOS_ENABLED:false}
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
    gateway:
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://127.0.0.1:9001}
          predicates:
            - Path=/auth/**
        - id: product-service
          uri: ${PRODUCT_SERVICE_URL:http://127.0.0.1:9002}
          predicates:
            - Path=/products/**
        - id: order-service-cart
          uri: ${ORDER_SERVICE_URL:http://127.0.0.1:9003}
          predicates:
            - Path=/cart/**
        - id: order-service-orders
          uri: ${ORDER_SERVICE_URL:http://127.0.0.1:9003}
          predicates:
            - Path=/orders/**
        - id: ai-service
          uri: ${AI_SERVICE_URL:http://127.0.0.1:9004}
          predicates:
            - Path=/ai/**

jwt:
  token-name: token
  ttl: 432000000000
  secret-key: yumefusaka
